name: lint

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 luarocks
          sudo luarocks install luacheck
      - name: Run luacheck
        run: luacheck mod/SolarpunkSurvival/Scripts --no-color -q

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Byte-compile tools
        run: python -m py_compile tools/dump-diff.py
